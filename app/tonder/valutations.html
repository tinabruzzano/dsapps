<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valutazioni - Tonder</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    font-size: 28px;
    font-weight: bold;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

#average-rating {
    font-size: 18px;
    margin-bottom: 15px;
    background: #1f2937;
    padding: 10px;
    border-radius: 8px;
}

.valutation {
    background: #1f2937;
    padding: 15px 20px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.valutation h3 {
    margin: 0 0 5px 0;
    color: #fbbf24;
}

.valutation p {
    margin: 0;
    font-size: 14px;
    color: #cbd5e1;
}

.button {
    display: inline-block;
    background: #2563eb;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    margin: 20px 0;
    cursor: pointer;
    border: none;
}

.button:hover {
    background: #1e40af;
}

.form-container {
    display: none;
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

.form-container textarea, 
.form-container select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}
</style>
</head>
<body>

<header>Valutazioni Ferdor Browser</header>

<div class="container">

    <!-- ⭐ MEDIA -->
    <div id="average-rating"></div>

    <!-- 📋 LISTA -->
    <div id="valutations-list"></div>

    <button class="button" onclick="showForm()">Valuta</button>

    <!-- 📝 FORM -->
    <div class="form-container" id="form-container">
        <h3>Nuova Valutazione</h3>

        <label>Stelle:</label>
        <select id="stars">
            <option value="1">⭐</option>
            <option value="2">⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="5">⭐⭐⭐⭐⭐</option>
        </select>

        <label>Titolo:</label>
        <input type="text" id="title" placeholder="Titolo della valutazione">

        <label>Descrizione:</label>
        <textarea id="description" rows="4" placeholder="Scrivi la tua recensione"></textarea>

        <button class="button" onclick="sendMail()">Invia Valutazione</button>
    </div>

</div>

<script>

// Mostra il form
function showForm() {
    document.getElementById('form-container').style.display = 'block';
}

// Carica JSON
fetch('v.json')
.then(response => response.json())
.then(data => {

    const list = document.getElementById('valutations-list');

    // ⭐ CALCOLO MEDIA
    let total = 0;
    data.forEach(v => total += v.stars);
    const average = (total / data.length).toFixed(1);

    // ⭐ CREA STELLE VISIVE
    function getStars(avg) {
        const full = Math.round(avg);
        return '⭐'.repeat(full);
    }

    // 📊 MOSTRA MEDIA
    const avgDiv = document.getElementById('average-rating');
    avgDiv.innerHTML = `
        Media valutazioni: <b>${average} ⭐</b><br>
        ${getStars(average)} (${data.length} recensioni)
    `;

    // 📋 MOSTRA RECENSIONI
    data.forEach(v => {
    const div = document.createElement('div');
    div.className = 'valutation';
    div.dataset.id = v.id; // <-- salva l'id
    div.style.cursor = 'pointer'; // mostra il cursore mano
    div.innerHTML = `
        <h3>${'⭐'.repeat(v.stars)} ${v.title}</h3>
        <p>${v.description}</p>
    `;
    
    // cliccando sulla card vai alla pagina responses?id=...
    div.addEventListener('click', () => {
        window.location.href = `responses.html?id=${v.id}`;
    });

    list.appendChild(div);
});

})
.catch(err => {
    console.error('Errore caricamento v.json', err);
    document.getElementById('valutations-list').innerHTML = "<p>Nessuna valutazione trovata.</p>";
});

// 📧 INVIO EMAIL
function sendMail() {
    const stars = document.getElementById('stars').value;
    const title = document.getElementById('title').value;
    const desc = document.getElementById('description').value;

    const bodyText =
`Valutazione Ferdor Browser

Stelle: ${stars}
Titolo: ${title}
Descrizione: ${desc}`;

    const subject = encodeURIComponent("Nuova Valutazione Ferdor Browser");
    const body = encodeURIComponent(bodyText);

    window.location.href = `mailto:domenigeco@gmail.com?subject=${subject}&body=${body}`;
}

</script>

</body>
</html>

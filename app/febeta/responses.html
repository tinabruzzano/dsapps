<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risposta - DomePrograms</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #111827;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    .card {
        background-color: #1f2937;
        padding: 30px;
        border-radius: 12px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    h1 {
        font-size: 24px;
        margin-bottom: 15px;
    }
    p {
        font-size: 18px;
        line-height: 1.5;
    }
    .error {
        color: #f87171;
    }
</style>
</head>
<body>
<div class="card">
    <h1 id="title">Caricamento...</h1>
    <p id="response">Attendere...</p>
</div>

<script>
// Funzione per leggere query string
function getQueryParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

async function loadResponse() {
    const id = getQueryParam('id');
    const titleEl = document.getElementById('title');
    const responseEl = document.getElementById('response');

    if (id === null) {
        titleEl.textContent = "Errore";
        responseEl.textContent = "ID non fornito nella query.";
        responseEl.classList.add('error');
        return;
    }

    try {
        // Carica v.json
        const res = await fetch('v.json');
        const data = await res.json();

        // Cerca l'oggetto con quell'id
        const item = data.find(x => x.id == id);

        if (!item) {
            titleEl.textContent = "Errore";
            responseEl.textContent = "ID non trovato.";
            responseEl.classList.add('error');
            return;
        }

        // Mostra titolo e risposta
        titleEl.textContent = item.title || "Risposta";
        responseEl.textContent = item.response || "Nessuna risposta";

    } catch (e) {
        titleEl.textContent = "Errore";
        responseEl.textContent = "Impossibile caricare v.json.";
        responseEl.classList.add('error');
        console.error(e);
    }
}

loadResponse();
</script>
</body>
</html>

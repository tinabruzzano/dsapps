<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profilo - DomePrograms</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* TOP BAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: #111827;
    border-bottom: 1px solid #1f2937;
}

.logo {
    font-weight: bold;
    color: #38bdf8;
}

.menu {
    display: flex;
    gap: 15px;
    align-items: center;
}

.menu a, .menu button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    text-decoration: none;
}

.menu a:hover, .menu button:hover {
    background: #1f2937;
}

.hamburger {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

.mobileMenu {
    display: none;
    flex-direction: column;
    background: #111827;
    border-top: 1px solid #1f2937;
}

.mobileMenu a, .mobileMenu button, .mobileMenu span {
    padding: 12px;
    color: white;
    background: none;
    border: none;
    text-align: left;
    font-size: 14px;
}

.container {
    padding: 40px;
}

input {
    display: block;
    width: 300px;
    padding: 8px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #1f2937;
    color: white;
}

button:hover {
    background: #374151;
}

.danger {
    margin-top: 40px;
    padding: 15px;
    border: 1px solid red;
    border-radius: 10px;
}

@media (max-width: 700px) {
    .menu { display: none; }
    .hamburger { display: block; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">DomePrograms</div>

    <div class="menu">
        <span id="userDesktop">👤 Guest</span>
        <a href="/dsapps/">Torna a DomePrograms</a>
        <button onclick="logout()">Esci</button>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div class="mobileMenu" id="mobileMenu">
    <span id="userMobile">👤 Guest</span>
    <a href="/dsapps/">Torna a DomePrograms</a>
    <button onclick="logout()">Esci</button>
</div>

<div class="container">
    <h1>Impostazioni profilo</h1>

    <h2>Generale</h2>

    <h3>Cambia username</h3>
    <input id="newUsername" placeholder="Nuovo username">
    <button onclick="changeUsername()">Cambia username</button>

    <h3>Cambia password</h3>
    <input id="oldPassword" type="password" placeholder="Vecchia password">
    <input id="newPassword" type="password" placeholder="Nuova password">
    <button onclick="changePassword()">Cambia password</button>

    <div class="danger">
        <h2>Zona Pericolosa</h2>

        <h3>Elimina account</h3>
        <input id="deletePassword" type="password" placeholder="Password">
        <button onclick="deleteAccount()">Elimina account</button>
    </div>
</div>

<script>
// ===== LOAD USER =====
let raw = localStorage.getItem("DSAPPSAuth");
let user = raw ? JSON.parse(raw) : null;

function saveUser() {
    localStorage.setItem("DSAPPSAuth", JSON.stringify(user));
    updateUI();
}

function updateUI() {
    if (!user) return;

    document.getElementById("userDesktop").innerText = "👤 " + user.username;
    document.getElementById("userMobile").innerText = "👤 " + user.username;
}

updateUI();

// ===== MENU MOBILE =====
function toggleMenu() {
    let menu = document.getElementById("mobileMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

// ===== CHANGE USERNAME =====
function changeUsername() {
    let newName = document.getElementById("newUsername").value;

    if (!newName) return alert("Inserisci username");

    user.username = newName;
    saveUser();

    alert("Username cambiato!");
}

// ===== CHANGE PASSWORD =====
function changePassword() {
    let oldP = document.getElementById("oldPassword").value;
    let newP = document.getElementById("newPassword").value;

    if (oldP !== user.password) {
        return alert("Vecchia password errata");
    }

    if (!newP) return alert("Inserisci nuova password");

    user.password = newP;
    saveUser();

    alert("Password cambiata!");
}

// ===== DELETE ACCOUNT =====
function deleteAccount() {
    let pass = document.getElementById("deletePassword").value;

    if (pass !== user.password) {
        return alert("Password errata");
    }

    localStorage.removeItem("DSAPPSAuth");
    alert("Account eliminato");

    window.location.href = "auth.html";
}

// ===== LOGOUT =====
function logout() {
    localStorage.removeItem("DSAPPSAuth");
    window.location.href = "auth.html?next=/dsapps/auth/";
}
</script>

</body>
</html>

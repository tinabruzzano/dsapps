<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@tonder - DomePrograms</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    background: #1f2937;
}

.handle {
    color: #9ca3af;
    font-size: 14px;
}

.verify-btn {
    margin-top: 10px;
    padding: 10px 20px;
    background: #10b981;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

.verify-btn:hover {
    background: #059669;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.program {
    background: #1f2937;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

h2 {
    border-bottom: 2px solid #374151;
    padding-bottom: 5px;
}

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.close-btn {
    margin-top: 10px;
    padding: 8px 15px;
    background: #ef4444;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>👨‍💻 Tonder</h1>
    <div class="handle">@tonder</div>
    
    <button class="verify-btn" onclick="openPopup()">✅ Verificato</button>
</header>

<div class="container">

    <h2>Collezione Tonder</h2>

    <div class="program" onclick="window.location.href='/dsapps/app/tonder/'">
        <h3>Tonder</h3>
        <p>Editor moderno con IA</p>
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>✔️ Autore Verificato</h2>
        <p>I programmi di questo autore sono affidabili e sicuri.</p>
        <button class="close-btn" onclick="closePopup()">Chiudi</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>

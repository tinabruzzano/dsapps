<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferdor Addons</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    transition: 0.2s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.03);
    background: #334155;
}

.title {
    font-size: 20px;
    margin-bottom: 10px;
}

.code {
    font-size: 12px;
    color: #94a3b8;
}

.desc {
    margin-top: 10px;
    font-size: 14px;
}

button {
    margin-top: 15px;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
🚀 Ferdor Addons
</header>

<div class="container">

    <h2>Addon disponibili</h2>

    <div class="grid">

        <!-- ADDON YOWZA -->
        <div class="card" onclick="openAddon('yowza')">
            <div class="title">AD Block Total</div>
            <div class="code">yowza</div>
            <div class="desc">Blocca TOTALMENTE Annunci</div>
            <button>Apri</button>
        </div>

        <!-- FUTURI ADDON -->
        <div class="card">
            <div class="title">Coming Soon</div>
            <div class="code">---</div>
            <div class="desc">Nuovi addon arriveranno presto 👀</div>
        </div>

    </div>

</div>

<script>
function openAddon(page) {
    window.location.href = page;
}
</script>

</body>
</html>
